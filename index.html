<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>社内ホームページ</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <!-- ヘッダー -->
  <header class="header">
    <div class="header-container">
      <div class="logo">
      </div>
      <nav class="navbar">
        <ul class="nav-list">
          <li><a href="#top">TOP</a></li>
          <li><a href="#materials">社内資料</a></li>
          <li><a href="#news">News</a></li>
          <li><a href="#outside">業務外</a></li>
        </ul>
      </nav>
      <a href="#contact" class="contact-btn">CONTACT</a>
    </div>
  </header>

  <!-- メインコンテンツ -->
  <main class="main-content">
    <!-- ヒーロー/イメージセクション -->
    <section class="hero-section">
      <div class="hero-content">
        <div class="hero-text">
          <p class="hero-subtitle">Terminal system社内サイト</p>
          <h2 class="hero-title">Oase</h2>
          <p class="hero-description">社内の様々な情報の共有の場として使用します。<br>※本サイトは社外秘です</p>
        </div>
        <div class="hero-image">
          <img src="images/page-top.png" alt="トップイメージ" class="hero-top-image">
        </div>
      </div>
    </section>
    <section class="section" id="news">
      <h2>最新情報</h2>
      <div class="latest-popup">
        <div class="popup-header">
          <span class="popup-label">最新の一件</span>
          <span class="popup-date">2026年6月18日</span>
        </div>
        <div class="popup-body">
          <h3>新着情報</h3>
          <p>社内ホームページをリニューアルしました。</p>
        </div>
      </div>
      <div class="news-list">
        <article class="news-item">
          <h3>重要なお知らせ</h3>
          <p class="date">2026年6月17日</p>
          <p>システムメンテナンスのお知らせです。詳しくは担当部署にお問い合わせください。</p>
        </article>
      </div>
    </section>
  </main>

  <!-- フッター -->
  <footer class="footer">
    <p>&copy; 2026 Company Name. All rights reserved.</p>
  </footer>

  <script src="js/script.js"></script>
</body>
</html>
